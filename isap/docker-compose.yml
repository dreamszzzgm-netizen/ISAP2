version: "3.9"

services:

  # PostgreSQL — основная БД
  db:
    image: postgres:16-alpine
    container_name: isap_db
    environment:
      POSTGRES_DB: isap
      POSTGRES_USER: isap_user
      POSTGRES_PASSWORD: isap_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isap_user -d isap"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ChromaDB — векторная БД для RAG
  chromadb:
    image: chromadb/chroma:latest
    container_name: isap_chromadb
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    environment:
      CHROMA_SERVER_AUTHN_CREDENTIALS: ""
      ANONYMIZED_TELEMETRY: "false"

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: isap_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://isap_user:isap_password@db:5432/isap
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      API_KEY: ${API_KEY:-isap-secret-2026}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_PROJECT_ID: ${OPENAI_PROJECT_ID:-}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:14b}
    volumes:
      - ./backend:/app
      - ./backend/templates:/app/templates
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js frontend (dev mode)
  frontend:
    image: node:22-alpine
    container_name: isap_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    command: sh -c "npm install --prefer-offline && npx next dev --webpack -H 0.0.0.0 -p 3000"

volumes:
  postgres_data:
  chroma_data:
