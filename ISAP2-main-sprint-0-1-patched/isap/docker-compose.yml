version: "3.9"

services:

  # PostgreSQL — основная БД
  db:
    image: postgres:16-alpine
    container_name: isap_db
    environment:
      POSTGRES_DB: isap
      POSTGRES_USER: isap_user
      POSTGRES_PASSWORD: isap_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isap_user -d isap"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ChromaDB — векторная БД для RAG
  chromadb:
    image: chromadb/chroma:latest
    container_name: isap_chromadb
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    environment:
      CHROMA_SERVER_AUTHN_CREDENTIALS: ""
      ANONYMIZED_TELEMETRY: "false"

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: isap_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://isap_user:isap_password@db:5432/isap
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      API_KEY: ${API_KEY:-isap-secret-2026}
      LLM_PROVIDER: ${LLM_PROVIDER:-lmstudio}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_PROJECT_ID: ${OPENAI_PROJECT_ID:-}
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      LMSTUDIO_API_KEY: ${LMSTUDIO_API_KEY:-lm-studio}
      LMSTUDIO_MODEL: ${LMSTUDIO_MODEL:-local-model}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-lmstudio}
      LMSTUDIO_EMBEDDING_MODEL: ${LMSTUDIO_EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-100}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-false}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:14b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    volumes:
      - ./backend:/app
      - ./backend/templates:/app/templates
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # React frontend (dev mode с Vite HMR)
  frontend:
    image: node:18-alpine
    container_name: isap_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  chroma_data:
  frontend_node_modules:
